<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeShare - Connect with Vibe</title>
    <link rel="manifest" href="/manifest.json" />
    <!-- Premium Google Fonts: Plus Jakarta Sans, Syne, Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister().then(() => {
                window.location.reload();
              });
            }
          });
        }
        if ("caches" in window) {
          caches.keys().then((keys) => {
            for (let key of keys) {
              caches.delete(key);
            }
          });
        }
      } else {
        if ("serviceWorker" in navigator) {
          window.addEventListener("load", () => {
            navigator.serviceWorker.register("/sw.js")
              .then(reg => console.log("Service Worker registered:", reg.scope))
              .catch(err => console.error("Service Worker registration failed:", err));
          });
        }
      }
    </script>
  </body>
</html>
